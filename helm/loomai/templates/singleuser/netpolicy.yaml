apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "loomai.fullname" . }}-singleuser
  labels:
    {{- include "loomai.labels" . | nindent 4 }}
    app.kubernetes.io/component: singleuser
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: singleuser
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from the proxy
    - from:
        - podSelector:
            matchLabels:
              {{- include "loomai.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: proxy
      ports:
        - port: 8888
          protocol: TCP
    # Allow traffic from the hub (for health checks, API calls)
    - from:
        - podSelector:
            matchLabels:
              {{- include "loomai.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: hub
  egress:
    # Allow DNS resolution
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow HTTPS to FABRIC infrastructure
    - to: []
      ports:
        - port: 443
          protocol: TCP
    # Allow SSH to FABRIC bastion
    - to: []
      ports:
        - port: 22
          protocol: TCP
    # Allow HTTP (some FABRIC services)
    - to: []
      ports:
        - port: 80
          protocol: TCP
    # Allow communication back to hub and proxy
    - to:
        - podSelector:
            matchLabels:
              {{- include "loomai.selectorLabels" . | nindent 14 }}
