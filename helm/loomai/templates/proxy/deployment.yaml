apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "loomai.proxy.fullname" . }}
  labels:
    {{- include "loomai.labels" . | nindent 4 }}
    app.kubernetes.io/component: proxy
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "loomai.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: proxy
  template:
    metadata:
      labels:
        {{- include "loomai.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: proxy
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/hub/secret.yaml") . | sha256sum }}
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: chp
          image: "{{ .Values.proxy.image.name }}:{{ .Values.proxy.image.tag }}"
          imagePullPolicy: {{ .Values.proxy.image.pullPolicy }}
          args:
            - configurable-http-proxy
            - "--ip=0.0.0.0"
            - "--port=8000"
            - "--api-ip=0.0.0.0"
            - "--api-port=8001"
            - "--default-target=http://{{ include "loomai.hub.fullname" . }}:8081"
            - "--error-target=http://{{ include "loomai.hub.fullname" . }}:8081/hub/error"
            - "--log-level=info"
            {{- if .Values.proxy.https.enabled }}
            - "--ssl-key=/etc/chp/tls/tls.key"
            - "--ssl-cert=/etc/chp/tls/tls.crt"
            {{- end }}
          env:
            - name: CONFIGPROXY_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "loomai.hub.fullname" . }}-secret
                  key: PROXY_AUTH_TOKEN
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: api
              containerPort: 8001
              protocol: TCP
          {{- if .Values.proxy.https.enabled }}
          volumeMounts:
            - name: tls
              mountPath: /etc/chp/tls
              readOnly: true
          {{- end }}
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
            {{- toYaml .Values.proxy.chp.resources | nindent 12 }}
      {{- if .Values.proxy.https.enabled }}
      volumes:
        - name: tls
          secret:
            secretName: {{ include "loomai.proxy.fullname" . }}-manual-tls
      {{- end }}
