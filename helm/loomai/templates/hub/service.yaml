apiVersion: v1
kind: Service
metadata:
  name: {{ include "loomai.hub.fullname" . }}
  labels:
    {{- include "loomai.labels" . | nindent 4 }}
    app.kubernetes.io/component: hub
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8081
      targetPort: http
      protocol: TCP
  selector:
    {{- include "loomai.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: hub
