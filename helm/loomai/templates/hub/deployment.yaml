apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "loomai.hub.fullname" . }}
  labels:
    {{- include "loomai.labels" . | nindent 4 }}
    app.kubernetes.io/component: hub
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "loomai.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: hub
  template:
    metadata:
      labels:
        {{- include "loomai.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: hub
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/hub/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/hub/secret.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "loomai.hub.serviceAccountName" . }}
      securityContext:
        fsGroup: 1000
      containers:
        - name: hub
          image: "{{ .Values.hub.image.name }}:{{ .Values.hub.image.tag }}"
          imagePullPolicy: {{ .Values.hub.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "loomai.hub.fullname" . }}-config
            - secretRef:
                name: {{ include "loomai.hub.fullname" . }}-secret
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          readinessProbe:
            httpGet:
              path: /hub/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /hub/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          resources:
            {{- toYaml .Values.hub.resources | nindent 12 }}
          volumeMounts:
            - name: hub-db
              mountPath: /srv/loomai/data
      volumes:
        - name: hub-db
          persistentVolumeClaim:
            claimName: {{ include "loomai.hub.fullname" . }}-db
