{{- if .Values.scheduling.userScheduler.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "loomai.fullname" . }}-user-scheduler
  labels:
    {{- include "loomai.labels" . | nindent 4 }}
    app.kubernetes.io/component: user-scheduler
data:
  config.yaml: |
    apiVersion: kubescheduler.config.k8s.io/v1
    kind: KubeSchedulerConfiguration
    leaderElection:
      leaderElect: true
      resourceNamespace: {{ .Release.Namespace }}
      resourceName: {{ include "loomai.fullname" . }}-user-scheduler-lock
    profiles:
      - schedulerName: {{ include "loomai.fullname" . }}-user-scheduler
        {{- if .Values.scheduling.userScheduler.plugins }}
        plugins:
          {{- .Values.scheduling.userScheduler.plugins | toYaml | nindent 10 }}
        {{- end }}
        {{- if .Values.scheduling.userScheduler.pluginConfig }}
        pluginConfig:
          {{- .Values.scheduling.userScheduler.pluginConfig | toYaml | nindent 10 }}
        {{- end }}
{{- end }}
