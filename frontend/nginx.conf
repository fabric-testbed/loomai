resolver 127.0.0.11 valid=10s;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 10m;

    # --- gzip compression ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types application/json application/javascript text/css text/javascript text/plain application/xml;

    # --- Cache hashed static assets (Vite uses content hashes) ---
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — short cache for index.html
    location / {
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # SSE streaming endpoints — long-running AI chat, boot config, recipe execution, and weave scripts
    location ~ ^/api/(ai/chat/stream|files/boot-config/.+/execute-all-stream|recipes/.+/execute/|templates/.+/run-script/)$ {
        set $backend_api http://backend:8000;
        proxy_pass $backend_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1800s;
        proxy_buffering off;
    }

    # Proxy API to backend (resolved at request time, not startup)
    location /api/ {
        set $backend_api http://backend:8000;
        proxy_pass $backend_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # JupyterLab proxy (HTTP + WebSocket)
    # ^~ ensures this prefix match takes priority over the static asset regex
    location ^~ /jupyter/ {
        set $jupyter_backend http://backend:8889;
        proxy_pass $jupyter_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 604800s;
        proxy_send_timeout 604800s;
        proxy_buffering off;
    }

    # WebSocket proxy
    location /ws/ {
        set $backend_ws http://backend:8000;
        proxy_pass $backend_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 604800s;
        proxy_send_timeout 604800s;
        proxy_buffering off;
    }
}
