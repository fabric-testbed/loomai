[pytest]
testpaths = tests
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning
markers =
    llm: marks tests that make real LLM API calls (deselect with '-m "not llm"')
    fabric: marks tests that make real FABRIC API calls (deselect with '-m "not fabric"')
    chameleon: marks tests that make real Chameleon API calls (deselect with '-m "not chameleon"')
    composite: marks tests that make real FABRIC + Chameleon API calls (deselect with '-m "not composite"')
addopts = -m "not llm and not fabric and not chameleon and not composite"
